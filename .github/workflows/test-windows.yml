name: Windows Test

on:
  push:
    branches: ["*"]
    paths:
      - "src/**"
      - "examples/**"
      - "c/**"
      - "deps/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/test-windows.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "src/**"
      - "examples/**"
      - "c/**"
      - "deps/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/test-windows.yml"
  workflow_dispatch:

jobs:
  test:
    name: test (x86_64, ${{ matrix.abi }}, ${{ matrix.zig }})
    runs-on: windows-latest
    strategy:
      matrix:
        abi: [gnu, msvc]
        zig: ["0.15.2", "0.16.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Run tests
        run: |
          zig build test -Dtarget=native-windows-${{ matrix.abi }}

      - name: Build examples
        run: |
          zig build examples -Dtarget=native-windows-${{ matrix.abi }}

      - name: Build examples (ReleaseSafe)
        run: |
          zig build examples -Dtarget=native-windows-${{ matrix.abi }} -Doptimize=ReleaseSafe

      - name: Build examples (ReleaseFast)
        run: |
          zig build examples -Dtarget=native-windows-${{ matrix.abi }} -Doptimize=ReleaseFast

      - name: Cache macOS SDK
        id: cache-macos-sdk
        uses: actions/cache@v4
        with:
          path: MacOSX15.5.sdk
          key: macos-sdk-15.5

      - name: Download macOS SDK
        if: steps.cache-macos-sdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/15.5/MacOSX15.5.sdk.tar.xz | tar -xJ

      - name: Build examples (Cross-compile for macOS aarch64 ReleaseFast)
        shell: bash
        run: |
          zig build examples -Dtarget=aarch64-macos -Dmacos-sdk="$GITHUB_WORKSPACE/MacOSX15.5.sdk" -Doptimize=ReleaseFast

      - name: Build examples (Cross-compile for macOS x86_64 ReleaseFast)
        shell: bash
        run: |
          zig build examples -Dtarget=x86_64-macos -Dmacos-sdk="$GITHUB_WORKSPACE/MacOSX15.5.sdk" -Doptimize=ReleaseFast
